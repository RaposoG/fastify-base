services:
  postgres:
    image: postgres:16-alpine
    container_name: app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-app_db}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-app_db}']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Se DATABASE_URL estiver no .env, ela vence. Caso contrário, usamos as discretas.
      DATABASE_URL: ${DATABASE_URL:-}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_NAME: ${DB_NAME:-app_db}
      DB_SSL: ${DB_SSL:-false}
      DB_SYNCHRONIZE: 'false'
      DB_LOGGING: 'false'
      # Secrets — em produção o app RECUSA subir com os defaults do template.
      # Defina estes no .env antes de `docker compose --profile full up`.
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?defina JWT_REFRESH_SECRET no .env}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      COOKIE_SECRET: ${COOKIE_SECRET:?defina COOKIE_SECRET no .env}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - '${PORT:-3333}:3333'
    healthcheck:
      test:
        [
          'CMD',
          'bun',
          '-e',
          "fetch('http://127.0.0.1:3333/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    profiles: ['full']

volumes:
  postgres_data:
    driver: local
